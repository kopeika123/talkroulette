services:
  postgres:
    image: postgres:17-alpine
    container_name: videochat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-videochat}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-videochat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: videochat-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-videochat}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://rtc.talkroulette.ru}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    ports:
      - "${SERVER_PORT:-5000}:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://talkroulette.ru}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://talkroulette.ru/api}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://rtc.talkroulette.ru}
        NEXT_PUBLIC_VK_APP_ID: ${NEXT_PUBLIC_VK_APP_ID}
        NEXT_PUBLIC_YANDEX_CLIENT_ID: ${NEXT_PUBLIC_YANDEX_CLIENT_ID}
    container_name: videochat-client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://talkroulette.ru}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://talkroulette.ru/api}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-wss://rtc.talkroulette.ru}
      NEXT_PUBLIC_VK_APP_ID: ${NEXT_PUBLIC_VK_APP_ID}
      NEXT_PUBLIC_YANDEX_CLIENT_ID: ${NEXT_PUBLIC_YANDEX_CLIENT_ID}
    ports:
      - "${CLIENT_PORT:-3000}:3000"

volumes:
  postgres_data:
